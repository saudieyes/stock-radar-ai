<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Radar AI</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:#0b1220; color:#e5e7eb; }
    .container { max-width:1280px; margin:0 auto; padding:16px; }
    .topbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .title { font-size:28px; font-weight:700; color:#f8fafc; }
    .subtitle { color:#94a3b8; font-size:14px; margin-top:4px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button {
      border:none; border-radius:10px; padding:10px 14px; font-size:14px; cursor:pointer;
      background:#1e293b; color:#f8fafc;
    }
    button.primary { background:#2563eb; }
    button:hover { opacity:.95; }
    input[type="text"]{
      width:100%; background:#0f172a; color:#f8fafc; border:1px solid #1f2937;
      border-radius:10px; padding:12px 14px; font-size:15px;
    }
    .statusbar { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:16px; }
    .stat,.search-box,.single-result,.loading,.error,.empty,.card {
      background:#111827; border:1px solid #1f2937; border-radius:14px;
    }
    .stat { padding:14px; }
    .stat-label { color:#94a3b8; font-size:13px; margin-bottom:8px; }
    .stat-value { font-size:22px; font-weight:700; color:#f8fafc; }
    .section { margin-bottom:18px; }
    .section-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
    .section-title { font-size:20px; font-weight:700; }
    .section-count { color:#94a3b8; font-size:13px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:14px; }
    .card { padding:14px; box-shadow:0 6px 18px rgba(0,0,0,0.18); }
    .card-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:10px; }
    .symbol { font-size:24px; font-weight:800; color:#f8fafc; line-height:1; }
    .company { color:#9ca3af; font-size:12px; margin-top:6px; }
    .badges { display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-start; }
    .badge { border-radius:999px; padding:5px 10px; font-size:12px; font-weight:700; display:inline-block; white-space:nowrap; }
    .badge-strong { background:#14532d; color:#dcfce7; }
    .badge-cautious { background:#78350f; color:#fef3c7; }
    .badge-watch { background:#1e3a8a; color:#dbeafe; }
    .badge-rank { background:#312e81; color:#e0e7ff; }
    .badge-exec { background:#3f3f46; color:#f4f4f5; }
    .metrics,.details-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .metrics { margin:12px 0; }
    .metric,.detail-box,.summary,.search-box,.single-result { background:#0f172a; border-radius:12px; padding:12px; border:1px solid #1e293b; }
    .metric-label,.detail-label { font-size:12px; color:#94a3b8; margin-bottom:6px; }
    .metric-value { font-size:17px; font-weight:700; color:#f8fafc; }
    .detail-value { color:#f8fafc; font-size:14px; line-height:1.7; word-break:break-word; }
    .detail-box.full { grid-column:1 / -1; }
    .summary { font-size:14px; color:#cbd5e1; line-height:1.8; margin-bottom:10px; }
    .green { color:#22c55e; } .red { color:#ef4444; } .yellow { color:#f59e0b; }
    details { margin-top:10px; background:#0f172a; border:1px solid #1e293b; border-radius:12px; padding:10px; }
    details summary { cursor:pointer; font-weight:700; color:#e5e7eb; outline:none; }
    .flags { margin:8px 0 0; padding-right:18px; color:#cbd5e1; font-size:13px; }
    .loading,.error,.empty { padding:18px; text-align:center; color:#cbd5e1; }
    .error { color:#fecaca; border-color:#7f1d1d; }
    .search-section { margin:20px 0; }
    .search-row { display:grid; grid-template-columns: 1fr auto; gap:10px; margin-top:10px; }
    .footer-note { margin-top:20px; color:#94a3b8; font-size:12px; text-align:center; }
    @media (max-width:700px) {
      .metrics,.details-grid,.search-row { grid-template-columns:1fr; }
      .title { font-size:24px; } .symbol { font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="title">Stock Radar AI</div>
        <div class="subtitle">لوحة عرض مبسطة للفرص مع بطاقات قابلة للتوسيع</div>
      </div>
      <div class="actions">
        <button class="primary" onclick="loadScan()">تحديث الفرص</button>
        <button onclick="toggleSection('top-ranked-section')">إظهار / إخفاء الأعلى ترتيبًا</button>
        <button onclick="toggleSection('cautious-section')">إظهار / إخفاء دخول بحذر</button>
        <button onclick="toggleSection('watch-section')">إظهار / إخفاء المراقبة</button>
      </div>
    </div>

    <div id="statusbar" class="statusbar"></div>
    <div id="content"><div class="loading">جاري تحميل البيانات...</div></div>

    <div class="search-section">
      <div class="section-header">
        <div class="section-title">فحص سهم واحد</div>
      </div>
      <div class="search-box">
        <div class="subtitle" style="margin:0 0 10px 0;">اكتب رمز السهم مثل: AAPL أو TSLA أو NVO أو IOT</div>
        <div class="search-row">
          <input id="singleSymbol" type="text" placeholder="مثال: AAPL" />
          <button class="primary" onclick="scanSingleStock()">فحص السهم</button>
        </div>
      </div>
      <div id="singleStockResult" style="margin-top:12px;"></div>
    </div>


    <div class="section" id="manual-watchlist-section">
      <div class="section-header">
        <div class="section-title">📌 قائمة المتابعة اليدوية</div>
        <div class="section-count" id="manual-watchlist-count">0</div>
      </div>
      <div id="manualWatchlist"><div class="empty">لا توجد أسهم مضافة يدويًا حتى الآن</div></div>
    </div>

    <div class="footer-note">البطاقة تعرض أهم المعلومات أولًا، والتفاصيل الكاملة تظهر عند الضغط على "عرض التفاصيل".</div>
  </div>

  <script>
    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "-";
      const num = Number(value);
      if (Number.isNaN(num)) return value;
      return num.toLocaleString("en-US", { maximumFractionDigits: 2 });
    }
    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "-";
      const num = Number(value);
      if (Number.isNaN(num)) return value;
      const cls = num > 0 ? "green" : num < 0 ? "red" : "";
      const sign = num > 0 ? "+" : "";
      return `<span class="${cls}">${sign}${num.toFixed(2)}%</span>`;
    }
    function badgeDecision(decision) {
      if (decision === "دخول قوي") return '<span class="badge badge-strong">دخول قوي</span>';
      if (decision === "دخول بحذر") return '<span class="badge badge-cautious">دخول بحذر</span>';
      return '<span class="badge badge-watch">مراقبة</span>';
    }
    function safeText(value) {
      if (value === null || value === undefined || value === "") return "-";
      return String(value);
    }

    function hasValue(value) {
      return !(value === null || value === undefined || value === "" || value === 0 || value === "0");
    }
    function detailBox(label, value, formatter = null, full = false) {
      if (!hasValue(value)) return "";
      const rendered = formatter ? formatter(value) : safeText(value);
      return `<div class="detail-box${full ? " full" : ""}"><div class="detail-label">${label}</div><div class="detail-value">${rendered}</div></div>`;
    }
    function getPriceSourceLabel(stock) {
      if (stock.price_source_label) return stock.price_source_label;
      const src = safeText(stock.price_source || "");
      if (src.includes("minute")) return "مباشر";
      if (src.includes("snapshot")) return "لقطة سوق";
      if (src.includes("previous_close")) return "آخر إغلاق";
      return src || "غير محدد";
    }
    function renderStatusbar(data) {
      const phase = data?.market_phase || "closed";
      const phaseLabel = data?.market_phase_label || (phase === "open" ? "مفتوح" : "مغلق");
      const isOpen = phase === "open";
      const generatedAt = safeText(data?.generated_at || "");
      document.getElementById("statusbar").innerHTML = `
        <div class="stat"><div class="stat-label">عدد الأسهم في Universe</div><div class="stat-value">${formatNumber(data.universe_count)}</div></div>
        <div class="stat"><div class="stat-label">إجمالي الفرص</div><div class="stat-value">${formatNumber(data.count)}</div></div>
        <div class="stat"><div class="stat-label">دخول قوي</div><div class="stat-value">${formatNumber(data.strong_entries_count)}</div></div>
        <div class="stat"><div class="stat-label">دخول بحذر</div><div class="stat-value">${formatNumber(data.cautious_entries_count)}</div></div>
        <div class="stat"><div class="stat-label">مراقبة</div><div class="stat-value">${formatNumber(data.watchlist_count)}</div></div>
        <div class="stat"><div class="stat-label">حالة السوق</div><div class="stat-value ${isOpen ? 'green' : 'yellow'}">${safeText(phaseLabel)}</div></div>
        <div class="stat"><div class="stat-label">آخر تحديث</div><div class="stat-value" style="font-size:16px">${generatedAt || "-"}</div></div>`;
    }

    function createCard(stock) {
      const currentPrice = stock.display_price ?? stock.current_price_live ?? stock.financials?.current_price ?? 0;
      const currentPriceLabel = stock.display_price_label || "السعر الحالي";
      const openPrice = stock.open_price_live ?? 0;
      const marketPhase = stock.market_phase || "closed";
      const changeLabel = marketPhase === "open"
        ? "التغير من الافتتاح"
        : marketPhase === "after_hours"
          ? "التغير بعد الإغلاق"
          : marketPhase === "pre_market"
            ? "التغير قبل الافتتاح"
            : "التغير عن الإغلاق";
      const changePct = stock.display_change_available === false
        ? null
        : (marketPhase === "open" ? (stock.change_from_open_pct ?? null) : (stock.change_vs_prev_close_pct ?? null));
      const riskPct = stock.risk_pct ?? 0;
      const company = stock.company || stock.symbol;
      const flags = Array.isArray(stock.risk_flags) ? stock.risk_flags : [];
      const watchPayload = {
        symbol: stock.symbol,
        price: Number(stock.current_price_live || stock.display_price || stock.entry_price_real || 0),
        recommendation: stock.decision || stock.execution_mode || "",
        note: stock.owner_action || stock.ai_summary || ""
      };

      return `
        <div class="card">
          <div class="card-top">
            <div>
              <div class="symbol">${safeText(stock.symbol)}</div>
              <div class="company">${safeText(company)}</div>
            </div>
            <div class="badges">
              ${badgeDecision(stock.decision)}
              ${hasValue(stock.signal_stage_label) ? `<span class="badge badge-watch">${safeText(stock.signal_stage_label)}</span>` : ""}
              ${hasValue(stock.rank_label) ? `<span class="badge badge-rank">${safeText(stock.rank_label)}</span>` : ""}
              ${hasValue(stock.execution_mode || stock.execution_status_ar || stock.execution_status) ? `<span class="badge badge-exec">${safeText(stock.execution_mode || stock.execution_status_ar || stock.execution_status)}</span>` : ""}
            </div>
          </div>

          <div class="metrics">
            <div class="metric"><div class="metric-label">${safeText(currentPriceLabel)}</div><div class="metric-value">${hasValue(currentPrice) ? formatNumber(currentPrice) : "غير متاح"}</div></div>
            <div class="metric"><div class="metric-label">${safeText(changeLabel)}</div><div class="metric-value">${changePct === null || changePct === undefined ? "غير متاح" : formatPercent(changePct)}</div></div>
            ${hasValue(stock.entry_price_real ?? stock.entry) ? `<div class="metric"><div class="metric-label">الدخول الفعلي</div><div class="metric-value">${formatNumber(stock.entry_price_real ?? stock.entry)}</div></div>` : ""}
            ${hasValue(stock.stop_loss) ? `<div class="metric"><div class="metric-label">وقف الخسارة</div><div class="metric-value">${formatNumber(stock.stop_loss)}</div></div>` : ""}
            ${hasValue(stock.breakout_price) ? `<div class="metric"><div class="metric-label">الاختراق</div><div class="metric-value">${formatNumber(stock.breakout_price)}</div></div>` : ""}
            ${hasValue(stock.confirmation_price) ? `<div class="metric"><div class="metric-label">التأكيد</div><div class="metric-value">${formatNumber(stock.confirmation_price)}</div></div>` : ""}
          </div>

          ${hasValue(stock.ai_summary) ? `<div class="summary">${safeText(stock.ai_summary)}</div>` : ""}
          ${hasValue(stock.execution_note || stock.owner_action) ? `<div class="summary"><strong>وضع التنفيذ:</strong> ${safeText(stock.execution_note || stock.owner_action)}</div>` : ""}
          <div class="summary"><strong>مصدر السعر:</strong> ${safeText(getPriceSourceLabel(stock))}${hasValue(stock.last_price_update_label) ? ` | <strong>آخر سعر:</strong> ${safeText(stock.last_price_update_label)}` : ""}</div>
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;">
            <button onclick='addToManualWatchlist(${JSON.stringify(watchPayload)})'>📌 إضافة للمراقبة</button>
          </div>

          <details>
            <summary>عرض التفاصيل</summary>
            <div class="details-grid">
              ${detailBox("سعر الافتتاح", openPrice, formatNumber)}
              ${detailBox("الإغلاق السابق", stock.previous_close_live, formatNumber)}
              ${detailBox("نوع المرحلة", stock.market_phase_label)}
              ${detailBox("سعر الاختراق", stock.breakout_price, formatNumber)}
              ${detailBox("سعر التأكيد", stock.confirmation_price, formatNumber)}
              ${detailBox("الدخول الفعلي", stock.entry_price_real ?? stock.entry, formatNumber)}
              ${detailBox("آخر دخول مناسب", stock.late_entry_price, formatNumber)}
              ${detailBox("إعادة دخول مقترحة", stock.reentry_pullback_price, formatNumber)}
              ${detailBox("اختراق جديد فوق", stock.rebreakout_price, formatNumber)}
              ${detailBox("دخول ذكي", stock.smart_entry_price, formatNumber)}
              ${detailBox("وقف ذكي", stock.smart_stop_price, formatNumber)}
              ${detailBox("هدف ذكي", stock.smart_target_1, formatNumber)}
              ${detailBox("السيولة اليومية", stock.volume_ratio, formatNumber)}
              ${detailBox("السيولة الفعلية", stock.effective_volume_ratio, formatNumber)}
              ${detailBox("VWAP اللحظي", stock.vwap_status)}
              ${detailBox("حالة السيولة", stock.volume_status)}
              ${detailBox("العائد/المخاطرة للهدف 1", stock.rr_1, formatNumber)}
              ${detailBox("صالح لمدة", stock.valid_for)}
              ${detailBox("جودة البيانات", stock.data_quality)}
              ${detailBox("الخبر / المحفز", stock.news_note, null, true)}
              ${detailBox("نوع حداثة الخبر", stock.news_freshness_label)}
              ${detailBox("جلسات منذ الخبر", stock.news_sessions_since)}
              ${detailBox("الشركة", stock.company)}
              ${detailBox("القطاع / الصناعة", `${safeText(stock.sector)} / ${safeText(stock.industry)}`)}
              ${flags.length ? `<div class="detail-box full"><div class="detail-label">الإشارات التحذيرية</div><div class="detail-value"><ul class="flags">${flags.map(f => `<li>${safeText(f)}</li>`).join("")}</ul></div></div>` : ""}
            </div>
          </details>
        </div>`;
    }
    function renderSection(id, title, items) {
      if (!items || !items.length) {
        return `<div class="section" id="${id}"><div class="section-header"><div class="section-title">${title}</div><div class="section-count">0</div></div><div class="empty">لا توجد أسهم في هذا القسم</div></div>`;
      }
      return `<div class="section" id="${id}"><div class="section-header"><div class="section-title">${title}</div><div class="section-count">${items.length}</div></div><div class="cards">${items.map(createCard).join("")}</div></div>`;
    }
    function renderContent(data) {
      const html = [
        renderSection("top-ranked-section", "الأعلى ترتيبًا", data.top_ranked || []),
        renderSection("cautious-section", "دخول بحذر", data.cautious_entries || []),
        renderSection("watch-section", "قائمة المراقبة", data.watchlist || []),
      ].join("");
      document.getElementById("content").innerHTML = html;
    }
    function toggleSection(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const cards = el.querySelector(".cards") || el.querySelector(".empty");
      if (!cards) return;
      cards.style.display = cards.style.display === "none" ? "" : "none";
    }
    async function loadScan() {
      document.getElementById("content").innerHTML = '<div class="loading">جاري تحديث الفرص...</div>';
      try {
        const response = await fetch("/trade-scan", { cache: "no-store" });
        const data = await response.json();
        if (data.error) {
          document.getElementById("content").innerHTML = `<div class="error">حدث خطأ: ${safeText(data.error)}</div>`;
          return;
        }
        renderStatusbar(data);
        renderContent(data);
        loadManualWatchlist();
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="error">تعذر تحميل البيانات: ${safeText(err.message)}</div>`;
      }
    }
    async function scanSingleStock() {
      const symbol = (document.getElementById("singleSymbol").value || "").trim().toUpperCase();
      const result = document.getElementById("singleStockResult");
      if (!symbol) {
        result.innerHTML = '<div class="error">اكتب رمز السهم أولاً</div>';
        return;
      }
      result.innerHTML = '<div class="loading">جاري فحص السهم...</div>';
      try {
        const res = await fetch(`/single-stock?symbol=${encodeURIComponent(symbol)}`, { cache: "no-store" });
        const data = await res.json();
        if (data.error) {
          result.innerHTML = `<div class="error">${safeText(data.error)}</div>`;
          return;
        }
        if (data.trade_plan) {
          result.innerHTML = `<div class="single-result">${createCard(data.trade_plan)}</div>`;
        } else if (data.overview && data.overview.available) {
          result.innerHTML = `<div class="single-result"><div class="summary"><strong>${safeText(data.overview.symbol)}</strong> - ${safeText(data.overview.company)}</div><div class="summary">لا توجد فرصة تداول حالية واضحة لهذا السهم، لكن يمكنك مراقبته.</div></div>`;
        } else {
          result.innerHTML = `<div class="error">لم أتمكن من جلب بيانات هذا السهم</div>`;
        }
      } catch (err) {
        result.innerHTML = `<div class="error">تعذر فحص السهم: ${safeText(err.message)}</div>`;
      }
    }

    async function addToManualWatchlist(payload) {
      try {
        const res = await fetch("/watchlist/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        await loadManualWatchlist();
        if (data.status === "exists") {
          alert("السهم موجود بالفعل في قائمة المتابعة");
        } else if (data.status === "added") {
          alert("تمت إضافة السهم إلى قائمة المتابعة");
        }
      } catch (err) {
        alert("تعذر إضافة السهم إلى قائمة المتابعة");
      }
    }

    async function removeFromManualWatchlist(symbol) {
      try {
        await fetch("/watchlist/remove", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ symbol })
        });
        await loadManualWatchlist();
      } catch (err) {
        alert("تعذر حذف السهم من قائمة المتابعة");
      }
    }

    async function loadManualWatchlist() {
      const container = document.getElementById("manualWatchlist");
      const countEl = document.getElementById("manual-watchlist-count");
      if (!container) return;
      try {
        const res = await fetch("/watchlist/manual", { cache: "no-store" });
        const data = await res.json();
        const items = data.items || [];
        countEl.textContent = items.length;
        if (!items.length) {
          container.innerHTML = '<div class="empty">لا توجد أسهم مضافة يدويًا حتى الآن</div>';
          return;
        }
        container.innerHTML = `<div class="cards">${items.map(item => `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="symbol">${safeText(item.symbol)}</div>
                <div class="company">${safeText(item.recommendation || "متابعة يدوية")}</div>
              </div>
              <div class="badges">
                <span class="badge badge-watch">${safeText(item.price_source_label || "")}</span>
              </div>
            </div>
            <div class="metrics">
              <div class="metric"><div class="metric-label">سعر الإضافة</div><div class="metric-value">${formatNumber(item.added_price)}</div></div>
              <div class="metric"><div class="metric-label">السعر الآن</div><div class="metric-value">${formatNumber(item.current_price)}</div></div>
              <div class="metric"><div class="metric-label">التغير</div><div class="metric-value">${formatPercent(item.change_pct)}</div></div>
              <div class="metric"><div class="metric-label">وقت الإضافة</div><div class="metric-value" style="font-size:13px">${safeText(item.added_at)}</div></div>
            </div>
            ${hasValue(item.note) ? `<div class="summary">${safeText(item.note)}</div>` : ""}
            <button onclick="removeFromManualWatchlist('${safeText(item.symbol)}')">🗑 حذف من المتابعة</button>
          </div>`).join("")}</div>`;
      } catch (err) {
        container.innerHTML = '<div class="error">تعذر تحميل قائمة المتابعة اليدوية</div>';
      }
    }


    loadManualWatchlist();
    loadScan();
  </script>
</body>
</html>
