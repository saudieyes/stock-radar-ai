<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Radar AI</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #07111f;
      --panel: #0d1b2d;
      --panel-2: #101f35;
      --line: #1c2f4b;
      --text: #eef4ff;
      --muted: #97a8c4;
      --blue: #2f6df6;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #4338ca;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #04101d 0%, #081424 100%);
      color: var(--text);
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 18px 14px 36px; }
    .topbar {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .title { font-size: 34px; font-weight: 800; }
    .subtitle { color: var(--muted); font-size: 15px; margin-top: 6px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: none; border-radius: 16px; padding: 12px 18px; font-size: 16px; cursor: pointer;
      background: #182742; color: var(--text); box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }
    button.primary { background: var(--blue); }
    button:hover { opacity: .96; }
    input[type="text"] {
      width: 100%; background: #081426; color: var(--text); border: 1px solid var(--line);
      border-radius: 16px; padding: 14px 16px; font-size: 17px;
    }
    .statusbar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px;
    }
    .stat, .search-box, .single-result, .loading, .error, .empty, .card {
      background: rgba(12, 25, 44, .96); border: 1px solid var(--line); border-radius: 22px;
    }
    .stat { padding: 18px; min-height: 116px; display: flex; flex-direction: column; justify-content: space-between; }
    .stat-label { color: var(--muted); font-size: 14px; }
    .stat-value { font-size: 28px; font-weight: 800; }
    .section { margin-bottom: 24px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .section-title { font-size: 34px; font-weight: 800; }
    .section-count { color: var(--muted); font-size: 16px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .card { padding: 16px; box-shadow: 0 10px 26px rgba(0,0,0,.18); }
    .card-top {
      display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 12px;
    }
    .symbol { font-size: 28px; font-weight: 900; line-height: 1; }
    .company { color: var(--muted); font-size: 13px; margin-top: 7px; line-height: 1.5; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 800; display: inline-block; white-space: nowrap;
    }
    .badge-strong { background: #14532d; color: #dcfce7; }
    .badge-cautious { background: #7c3b0d; color: #fff0c7; }
    .badge-watch { background: #2143a8; color: #dbeafe; }
    .badge-rank { background: var(--purple); color: #eef2ff; }
    .badge-exec { background: #474b57; color: #f5f5f5; }
    .badge-late { background: #6b7280; color: #fff7d6; }
    .metrics, .details-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .metrics { margin: 12px 0 14px; }
    .metric, .detail-box, .summary, .search-box, .single-result {
      background: #091628; border-radius: 18px; padding: 14px; border: 1px solid #182a42;
    }
    .metric { min-height: 102px; display: flex; flex-direction: column; justify-content: center; }
    .metric-label, .detail-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .metric-value { font-size: 22px; font-weight: 800; line-height: 1.25; }
    .detail-value { color: var(--text); font-size: 15px; line-height: 1.85; word-break: break-word; }
    .detail-box.full { grid-column: 1 / -1; }
    .summary { font-size: 15px; color: #d7e3f7; line-height: 1.9; margin-bottom: 10px; }
    .main-decision {
      border: 1px solid #1a3558; background: linear-gradient(180deg, #0b182c 0%, #0d1d33 100%);
      padding: 15px; border-radius: 18px; margin-bottom: 12px;
    }
    .main-decision strong { color: #fff; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .yellow { color: var(--orange); }
    details {
      margin-top: 10px; background: #081426; border: 1px solid #182a42; border-radius: 18px; padding: 12px;
    }
    details summary { cursor: pointer; font-weight: 800; color: var(--text); outline: none; font-size: 15px; }
    .flags { margin: 8px 0 0; padding-right: 18px; color: #d7e3f7; font-size: 14px; line-height: 1.9; }
    .loading, .error, .empty { padding: 20px; text-align: center; color: #d7e3f7; }
    .error { color: #ffd0d0; border-color: #7f1d1d; }
    .search-section { margin: 22px 0; }
    .search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 10px; }
    .footer-note { margin-top: 22px; color: var(--muted); font-size: 13px; text-align: center; }
    .hidden-block { display: none !important; }
    @media (max-width: 700px) {
      .metrics, .details-grid, .search-row { grid-template-columns: 1fr; }
      .title { font-size: 28px; }
      .section-title { font-size: 28px; }
      .symbol { font-size: 25px; }
      .metric-value { font-size: 20px; }
      button { width: 100%; }
      .actions { width: 100%; }
      .actions button { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="title">Stock Radar AI</div>
        <div class="subtitle">عرض مختصر وواضح للفرص أولًا، والتفاصيل الكاملة داخل كل بطاقة.</div>
      </div>
      <div class="actions">
        <button class="primary" onclick="loadScan()">تحديث الفرص</button>
        <button onclick="toggleSection('top-ranked-section')">إظهار / إخفاء الأعلى ترتيبًا</button>
        <button onclick="toggleSection('cautious-section')">إظهار / إخفاء دخول بحذر</button>
        <button onclick="toggleSection('watch-section')">إظهار / إخفاء المراقبة</button>
      </div>
    </div>

    <div id="statusbar" class="statusbar"></div>
    <div id="content"><div class="loading">جاري تحميل البيانات...</div></div>

    <div class="search-section">
      <div class="section-header">
        <div class="section-title">فحص سهم واحد</div>
      </div>
      <div class="search-box">
        <div class="subtitle" style="margin:0 0 10px 0;">اكتب رمز السهم مثل: AAPL أو TSLA أو NVO أو IOT</div>
        <div class="search-row">
          <input id="singleSymbol" type="text" placeholder="مثال: AAPL" />
          <button class="primary" onclick="scanSingleStock()">فحص السهم</button>
        </div>
      </div>
      <div id="singleStockResult" style="margin-top:12px;"></div>
    </div>

    <div class="footer-note">البطاقة الرئيسية تعرض القرار والتنفيذ بسرعة، وكل ما عدا ذلك داخل "عرض التفاصيل".</div>
  </div>

  <script>
    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "-";
      const num = Number(value);
      if (Number.isNaN(num)) return value;
      return num.toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function formatPercent(value) {
      if (value === null || value === undefined || value === "") return "-";
      const num = Number(value);
      if (Number.isNaN(num)) return value;
      const cls = num > 0 ? "green" : num < 0 ? "red" : "";
      const sign = num > 0 ? "+" : "";
      return `<span class="${cls}">${sign}${num.toFixed(2)}%</span>`;
    }

    function safeText(value) {
      if (value === null || value === undefined || value === "") return "-";
      return String(value);
    }

    function hasValue(value) {
      if (value === null || value === undefined) return false;
      const text = String(value).trim();
      if (text === "" || text === "-") return false;
      return true;
    }

    function metricBox(label, valueHtml) {
      return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value">${valueHtml}</div></div>`;
    }

    function detailBox(label, value, full = false) {
      if (!hasValue(value)) return "";
      return `<div class="detail-box ${full ? 'full' : ''}"><div class="detail-label">${label}</div><div class="detail-value">${value}</div></div>`;
    }

    function badgeDecision(decision) {
      if (decision === "دخول قوي") return '<span class="badge badge-strong">دخول قوي</span>';
      if (decision === "دخول بحذر") return '<span class="badge badge-cautious">دخول بحذر</span>';
      return '<span class="badge badge-watch">مراقبة</span>';
    }

    function badgeExecution(mode) {
      const text = safeText(mode);
      if (text.includes("جاهز")) return `<span class="badge badge-strong">${text}</span>`;
      if (text.includes("بحذر")) return `<span class="badge badge-cautious">${text}</span>`;
      if (text.includes("متأخر") || text.includes("تجنب")) return `<span class="badge badge-late">${text}</span>`;
      if (text.includes("اختراق") || text.includes("تأكيد") || text.includes("افتتاح")) return `<span class="badge badge-exec">${text}</span>`;
      return `<span class="badge badge-watch">${text}</span>`;
    }

    function renderStatusbar(data) {
      const phase = data?.market_phase || "closed";
      const phaseLabel = data?.market_phase_label || (phase === "open" ? "مفتوح" : "مغلق");
      const isOpen = phase === "open";
      document.getElementById("statusbar").innerHTML = `
        <div class="stat"><div class="stat-label">عدد الأسهم في Universe</div><div class="stat-value">${formatNumber(data.universe_count)}</div></div>
        <div class="stat"><div class="stat-label">إجمالي الفرص</div><div class="stat-value">${formatNumber(data.count)}</div></div>
        <div class="stat"><div class="stat-label">دخول قوي</div><div class="stat-value">${formatNumber(data.strong_entries_count)}</div></div>
        <div class="stat"><div class="stat-label">دخول بحذر</div><div class="stat-value">${formatNumber(data.cautious_entries_count)}</div></div>
        <div class="stat"><div class="stat-label">مراقبة</div><div class="stat-value">${formatNumber(data.watchlist_count)}</div></div>
        <div class="stat"><div class="stat-label">حالة السوق</div><div class="stat-value ${isOpen ? 'green' : 'yellow'}">${safeText(phaseLabel)}</div></div>`;
    }

    function createCard(stock) {
      const currentPrice = stock.current_price_live ?? stock.financials?.current_price ?? 0;
      const marketPhase = stock.market_phase || "closed";
      const changeLabel = marketPhase === "open"
        ? "التغير من الافتتاح"
        : marketPhase === "after_hours"
          ? "التغير بعد الإغلاق"
          : marketPhase === "pre_market"
            ? "التغير قبل الافتتاح"
            : "التغير عن الإغلاق";
      const changePct = marketPhase === "open"
        ? (stock.change_from_open_pct ?? 0)
        : (stock.change_vs_prev_close_pct ?? 0);
      const company = stock.company || stock.symbol;
      const flags = Array.isArray(stock.risk_flags) ? stock.risk_flags : [];
      const stopPrice = stock.smart_stop_price ?? stock.stop_loss;
      const entryPrice = stock.smart_entry_price ?? stock.entry_price_real ?? stock.entry;
      const targetPrice = stock.smart_target_1 ?? stock.target_1;
      const breakout = stock.breakout_price;
      const confirm = stock.confirmation_price;
      const compactSummary = stock.owner_action || stock.execution_note || stock.ai_summary || "-";

      const detailGrid = [
        detailBox("سعر الافتتاح", formatNumber(stock.open_price_live)),
        detailBox("الإغلاق السابق", formatNumber(stock.previous_close_live)),
        detailBox("نوع المرحلة", safeText(stock.market_phase_label || stock.market_phase)),
        detailBox("سعر الاختراق", formatNumber(breakout)),
        detailBox("سعر التأكيد", formatNumber(confirm)),
        detailBox("الدخول الفعلي", formatNumber(stock.entry_price_real ?? stock.entry)),
        detailBox("آخر دخول مناسب", formatNumber(stock.late_entry_price)),
        detailBox("دخول ذكي", formatNumber(stock.smart_entry_price)),
        detailBox("وقف ذكي", formatNumber(stock.smart_stop_price)),
        detailBox("هدف ذكي", formatNumber(stock.smart_target_1)),
        detailBox("VWAP اللحظي", safeText(stock.vwap_status)),
        detailBox("حالة السيولة", safeText(stock.volume_status)),
        detailBox("السيولة اليومية", formatNumber(stock.volume_ratio)),
        detailBox("السيولة الفعلية", formatNumber(stock.effective_volume_ratio)),
        detailBox("العائد/المخاطرة للهدف 1", formatNumber(stock.rr_1)),
        detailBox("المسافة إلى الدخول", formatPercent(stock.distance_to_entry_pct ?? 0)),
        detailBox("الترند", safeText(stock.trend)),
        detailBox("نوع الفرصة", safeText(stock.type)),
        detailBox("الهدف الأول", formatNumber(stock.target_1)),
        detailBox("الهدف الثاني", formatNumber(stock.target_2)),
        detailBox("حالة الاختراق", safeText(stock.breakout_status)),
        detailBox("صالح لمدة", safeText(stock.valid_for)),
        detailBox("جودة البيانات", safeText(stock.data_quality)),
        detailBox("الإجراء المقترح", safeText(stock.owner_action), true),
        detailBox("الخبر / المحفز", safeText(stock.news_note), true),
        detailBox("نوع حداثة الخبر", safeText(stock.news_freshness_label)),
        detailBox("جلسات منذ الخبر", safeText(stock.news_sessions_since)),
        detailBox("الشركة", safeText(stock.company)),
        detailBox("القطاع / الصناعة", `${safeText(stock.sector)} / ${safeText(stock.industry)}`),
        flags.length ? detailBox("الإشارات التحذيرية", `<ul class="flags">${flags.map(f => `<li>${safeText(f)}</li>`).join("")}</ul>`, true) : ""
      ].join("");

      return `
        <div class="card">
          <div class="card-top">
            <div>
              <div class="symbol">${safeText(stock.symbol)}</div>
              <div class="company">${safeText(company)}</div>
            </div>
            <div class="badges">
              ${badgeDecision(stock.decision)}
              <span class="badge badge-rank">${safeText(stock.rank_label)}</span>
              ${badgeExecution(stock.execution_mode || stock.execution_status_ar || stock.execution_status)}
            </div>
          </div>

          <div class="metrics">
            ${metricBox("السعر الحالي", formatNumber(currentPrice))}
            ${metricBox(changeLabel, formatPercent(changePct))}
            ${metricBox("سعر الاختراق", formatNumber(breakout))}
            ${metricBox("سعر التأكيد", formatNumber(confirm))}
            ${metricBox("الدخول", formatNumber(entryPrice))}
            ${metricBox("وقف الخسارة", formatNumber(stopPrice))}
            ${metricBox("الهدف الأول", formatNumber(targetPrice))}
            ${metricBox("الجودة", formatNumber(stock.quality_score))}
          </div>

          <div class="main-decision"><strong>القرار الآن:</strong> ${safeText(compactSummary)}</div>
          <div class="summary"><strong>حالة السوق:</strong> ${safeText(stock.market_phase_label || "-")} | <strong>إشارة التوقيت:</strong> ${safeText(stock.timing_signal || stock.execution_mode || "-")}</div>
          <div class="summary"><strong>ملخص:</strong> ${safeText(stock.ai_summary)}</div>

          <details>
            <summary>عرض التفاصيل</summary>
            <div class="details-grid">${detailGrid}</div>
          </details>
        </div>`;
    }

    function renderSection(id, title, items) {
      if (!items || !items.length) {
        return `<div class="section" id="${id}"><div class="section-header"><div class="section-title">${title}</div><div class="section-count">0</div></div><div class="empty">لا توجد أسهم في هذا القسم</div></div>`;
      }
      return `<div class="section" id="${id}"><div class="section-header"><div class="section-title">${title}</div><div class="section-count">${items.length}</div></div><div class="cards">${items.map(createCard).join("")}</div></div>`;
    }

    function renderContent(data) {
      const html = [
        renderSection("top-ranked-section", "الأعلى ترتيبًا", data.top_ranked || []),
        renderSection("cautious-section", "دخول بحذر", data.cautious_entries || []),
        renderSection("watch-section", "قائمة المراقبة", data.watchlist || []),
      ].join("");
      document.getElementById("content").innerHTML = html;
    }

    function toggleSection(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const cards = el.querySelector(".cards") || el.querySelector(".empty");
      if (!cards) return;
      cards.classList.toggle("hidden-block");
    }

    async function loadScan() {
      document.getElementById("content").innerHTML = '<div class="loading">جاري تحديث الفرص...</div>';
      try {
        const response = await fetch("/trade-scan", { cache: "no-store" });
        const data = await response.json();
        if (data.error) {
          document.getElementById("content").innerHTML = `<div class="error">حدث خطأ: ${safeText(data.error)}</div>`;
          return;
        }
        renderStatusbar(data);
        renderContent(data);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="error">تعذر تحميل البيانات: ${safeText(err.message)}</div>`;
      }
    }

    async function scanSingleStock() {
      const symbol = (document.getElementById("singleSymbol").value || "").trim().toUpperCase();
      const result = document.getElementById("singleStockResult");
      if (!symbol) {
        result.innerHTML = '<div class="error">اكتب رمز السهم أولاً</div>';
        return;
      }
      result.innerHTML = '<div class="loading">جاري فحص السهم...</div>';
      try {
        const res = await fetch(`/single-stock?symbol=${encodeURIComponent(symbol)}`, { cache: "no-store" });
        const data = await res.json();
        if (data.error) {
          result.innerHTML = `<div class="error">${safeText(data.error)}</div>`;
          return;
        }
        if (data.trade_plan) {
          result.innerHTML = `<div class="single-result">${createCard(data.trade_plan)}</div>`;
        } else if (data.overview && data.overview.available) {
          result.innerHTML = `<div class="single-result"><div class="summary"><strong>${safeText(data.overview.symbol)}</strong> - ${safeText(data.overview.company)}</div><div class="summary">لا توجد فرصة تداول واضحة الآن، لكن السهم ما زال قابلًا للمراقبة.</div></div>`;
        } else {
          result.innerHTML = '<div class="error">لم أتمكن من جلب بيانات هذا السهم</div>';
        }
      } catch (err) {
        result.innerHTML = `<div class="error">تعذر فحص السهم: ${safeText(err.message)}</div>`;
      }
    }

    loadScan();
  </script>
</body>
</html>
